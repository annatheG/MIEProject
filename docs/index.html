<!DOCTYPE html>
<html>
<head>
<title>Memory Experiment</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Memory Study</h1>
<p>Please enter your information before starting the study.</p>
<p>We don't sell your information. Your data will be used solely for research purposes.</p>

<form id="infoForm">
    <label>Name:</label>
    <input type="text" id="name" required>

    <label>Email:</label>
    <input type="email" id="email" required>

    <label>School:</label>
    <input type="text" id="school" required>

    <label>Major:</label>
    <input type="text" id="major" required>

    <div style="text-align:center;">
    <button type="submit">Begin Study</button>
</div>
</form>

<script>
document.getElementById("infoForm").addEventListener("submit", function(e){
    e.preventDefault();

    // Randomly assign group A or B
    const group = Math.random() < 0.5 ? "A" : "B";

    const participant = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        school: document.getElementById("school").value,
        major: document.getElementById("major").value,
        group: group
    };

    localStorage.setItem("participantInfo", JSON.stringify(participant));

    // Redirect to the correct test
    window.location.href = group === "A" ? "testa.html" : "testb.html";
});
</script>

</body>
</html>
