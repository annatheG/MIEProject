<!DOCTYPE html>
<html>
<head>
<title>Memory Experiment</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Memory Study</h1>
<p>Please enter your information before starting the study.</p>
<p>We don't sell your information. Your data will be used solely for research purposes.</p>

<form id="infoForm">
    <label>Name:</label>
    <input type="text" id="name" required>

    <label>Email:</label>
    <input type="email" id="email" required>

    <label>School:</label>
    <input type="text" id="school" required>

    <label>Major:</label>
    <input type="text" id="major" required>

    <button type="submit">Begin Study</button>
</form>

<script>
document.getElementById("infoForm").addEventListener("submit", function(e){
    e.preventDefault();

    const participant = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        school: document.getElementById("school").value,
        major: document.getElementById("major").value
    };

    localStorage.setItem("participantInfo", JSON.stringify(participant));

    window.location.href = "test.html";
});
</script>

</body>
</html>
